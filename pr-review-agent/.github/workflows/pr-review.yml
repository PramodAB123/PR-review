name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel previous run if new commit pushed to same PR
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI code review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate agent definition
        run: npm run validate

      - name: Run PR review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          LLM_ADAPTER:  groq
          DRY_RUN:      false
        run: node src/index.js ${{ github.event.pull_request.number }}
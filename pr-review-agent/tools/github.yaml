name: github
description: "GitHub PR operations via gh CLI"
input_schema:
  type: object
  properties:
    pr_number:
      type: integer
      description: "Pull request number"
    action:
      type: string
      enum: [comment, request-changes, approve]
      description: "Review action"
    file:
      type: string
      description: "File containing the review body"
  required: [pr_number]
implementation:
  type: script
  path: "not_implemented.js"
  runtime: "node"